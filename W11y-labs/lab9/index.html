<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Практична 9: Доступні форми</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Реєстрація студента</h1>
  
  <form id="feedbackForm" novalidate>
    <fieldset>
      <legend>Контактна та облікова інформація</legend>
      
      <div class="form-control">
        <label for="username">ПІБ (обов'язково)</label>
        <input type="text" id="username" required aria-describedby="username-hint">
        <p id="username-hint" class="hint">Введіть ваше повне ім'я.</p>
        <p id="username-error" class="error-msg" hidden></p>
      </div>

      <div class="form-control">
        <label for="email">Електронна адреса (обов'язково)</label>
        <input type="email" id="email" required aria-describedby="email-hint">
        <p id="email-hint" class="hint">Наприклад: student@knu.ua</p>
        <p id="email-error" class="error-msg" hidden></p>
      </div>

      <div class="form-control">
        <label for="password">Пароль</label>
        <input type="password" id="password" required aria-describedby="password-hint">
        <p id="password-hint" class="hint">Мінімум 8 символів.</p>
        <p id="password-error" class="error-msg" hidden></p>
      </div>

      <div class="form-control">
        <label for="course">Курс</label>
        <select id="course" required aria-describedby="course-hint">
          <option value="">-- Оберіть курс --</option>
          <option value="1">1 курс</option>
          <option value="2">2 курс</option>
        </select>
        <p id="course-hint" class="hint">Вкажіть ваш поточний рік навчання.</p>
        <p id="course-error" class="error-msg" hidden></p>
      </div>
    </fieldset>

    <div id="form-summary" role="alert" aria-live="assertive"></div>
    
    <button type="submit">Зареєструватися</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
