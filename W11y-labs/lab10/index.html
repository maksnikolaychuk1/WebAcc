<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab10</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Lab10. Робота з кастомними слайдерами</h1>
        <div class="slider-container">
            <label for="slider1">Volume:</label>
            <input type="range" id="slider1" class="slider" min="0" max="100" value="50">
            <div aria-labelledby="volume-slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0">
            </div>
            <div>
                <h3 id="volume-label">Volume:</h3>
                <div id="volume-rail" class="slider-rail">
                <div id="volume-slider" role="slider" aria-labelledby="volume-label" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0">
                </div>
                </div>
                <div role="volume-label" aria-labelledby="volume-slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0"></div>
                <div id="volume-value">
                    Volume is: 50%
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
